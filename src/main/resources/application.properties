# HTTP configuration - Cloud Run injects PORT env var; falls back to 8080 locally
quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

# Google Cloud Firestore configuration
quarkus.google.cloud.project-id=tech-challenge4-feedback

# Mailer (Mailtrap sandbox) configuration
quarkus.mailer.from=noreply@feedback-service.tech
quarkus.mailer.host=sandbox.smtp.mailtrap.io
quarkus.mailer.port=2525
quarkus.mailer.username=${MAILTRAP_USERNAME}
quarkus.mailer.password=${MAILTRAP_PASSWORD}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.auth-methods=PLAIN LOGIN
quarkus.mailer.mock=false

# Weekly report configuration
app.relatorio.token=${RELATORIO_TOKEN}
app.relatorio.destinatario=admin@feedback-service.tech
app.relatorio.dias-janela=7
